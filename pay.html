  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      min-height: 100vh; background: #141414; color: #efefef;

      font-family: 'DM Sans', sans-serif; font-weight: 300;

      display: flex; align-items: center; justify-content: center; padding: 24px;

    }

    .pay-card {

      background: #252525; border: 1px solid #454545; border-radius: 8px;

      width: 100%; max-width: 440px; padding: 36px 32px; text-align: center;

      box-shadow: 0 8px 32px rgba(0,0,0,.35);

    }

    .pay-logo { width: 88px; height: 88px; object-fit: contain; margin: 0 auto 16px; display: block; }

    .pay-brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 4px; }

    .pay-sub { font-size: .78rem; color: #9a9a9a; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 28px; }

    .pay-customer { font-size: .9rem; color: #c4c4c4; margin-bottom: 20px; }

    .pay-items { text-align: left; margin-bottom: 20px; border-top: 1px solid #454545; border-bottom: 1px solid #454545; padding: 12px 0; }

    .pay-line { display: flex; justify-content: space-between; gap: 12px; font-size: .85rem; padding: 6px 0; color: #c4c4c4; }

    .pay-line span:last-child { color: #efefef; white-space: nowrap; }

    .pay-discount { color: #4caf72; }

    .pay-total { display: flex; justify-content: space-between; align-items: baseline; margin: 18px 0 24px; }

    .pay-total-label { font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: #9a9a9a; }

    .pay-total-amt { font-family: 'Playfair Display', serif; font-size: 2rem; color: #efefef; }

    .pay-btn {

      width: 100%; padding: 14px; border: none; border-radius: 4px; cursor: pointer;

      background: #d0d0d0; color: #121212; font-family: 'DM Sans', sans-serif;

      font-size: .88rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase;

      transition: background .2s;

    }

    .pay-btn:hover:not(:disabled) { background: #efefef; }

    .pay-btn:disabled { opacity: .5; cursor: not-allowed; }

    .pay-note { font-size: .74rem; color: #9a9a9a; margin-top: 14px; line-height: 1.5; }

    .pay-field { text-align: left; margin-bottom: 18px; }

    .pay-field label { display: block; font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; color: #9a9a9a; margin-bottom: 6px; }

    .pay-field input, .pay-field textarea {

      width: 100%; padding: 11px 12px; border-radius: 4px; border: 1px solid #454545;

      background: #1a1a1a; color: #efefef; font-family: 'DM Sans', sans-serif; font-size: .88rem;

    }

    .pay-field input::placeholder, .pay-field textarea::placeholder { color: #666; }

    .pay-field-hint { font-size: .72rem; color: #777; margin-top: 5px; line-height: 1.4; }

    .pay-status { font-size: 2.4rem; margin-bottom: 12px; }

    .pay-status-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; }

    .pay-status-sub { font-size: .88rem; color: #9a9a9a; line-height: 1.55; }

    .pay-error { color: #e57368; font-size: .88rem; margin-top: 16px; }

    .spinner-wrap { padding: 40px 0; color: #9a9a9a; font-size: .85rem; }

  </style>

<body>

  <div class="pay-card" id="payCard">

    <div class="spinner-wrap" id="payLoading">Loading payment link…</div>

  </div>

<script>

  const SUPABASE_URL = 'https://ayuzmwpmhncxrugsyxmw.supabase.co';

  const SUPABASE_ANON_KEY = 'sb_publishable_UDYvyCRXZl3Ci9zIRKJhVQ_XdYKcUdn';

  const PAY_APP = 'gremier-pay';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);



  const params = new URLSearchParams(window.location.search);

  const REUSABLE_MARKER = 'gremier:reusable';

  function isReusableLink(link) {
    if (!link) return false;
    if (link.reusable === true) return true;
    return link.tranzila_url === REUSABLE_MARKER;
  }

  const linkCode = params.get('code');

  let orderId = null;

  let paymentLink = null;

  let payView = 'loading';

  let navSkipPush = false;

  let paymentStarting = false;



  function payUrl() {

    return linkCode ? `pay.html?code=${encodeURIComponent(linkCode)}` : 'pay.html';

  }

  function navPayPush(view) {

    if (navSkipPush) return;

    payView = view;

    history.pushState({ view, code: linkCode, __app: PAY_APP }, '', payUrl());

  }

  function navPayReplace(view) {

    if (navSkipPush) return;

    payView = view;

    history.replaceState({ view, code: linkCode, __app: PAY_APP }, '', payUrl());

  }

  function navPayBack() {

    if (!navSkipPush) history.back();

  }

  function applyPayView(view) {

    payView = view;

    if (view === 'checkout' && paymentLink) renderCheckout(paymentLink);

    else if (view === 'pending') renderProcessing();

    else if (view === 'paid') renderPaid();

    else if (view === 'failed') renderFailed();

    else if (view === 'invalid') renderInvalid();

    else if (view === 'notfound') renderNotFound();

  }

  function handlePayPopState(e) {

    navSkipPush = true;

    try {

      if (!e.state || e.state.__app !== PAY_APP) {

        if (paymentLink) {

          applyPayView('checkout');

          navPayReplace('checkout');

        }

        return;

      }

      applyPayView(e.state.view || 'checkout');

    } finally {

      navSkipPush = false;

    }

  }



  function payStorageKey(orderId, suffix) {
    return 'gremier_pay_' + orderId + '_' + suffix;
  }

  function rememberCheckoutSession(orderId, paymeSaleId, code) {
    if (!orderId) return;
    try {
      if (paymeSaleId) sessionStorage.setItem(payStorageKey(orderId, 'sale'), paymeSaleId);
      if (code) sessionStorage.setItem(payStorageKey(orderId, 'code'), code);
      sessionStorage.setItem('gremier_pay_last_order', orderId);
      sessionStorage.setItem(payStorageKey(orderId, 'started'), String(Date.now()));
    } catch (_) {}
  }

  function clearCheckoutSession(orderId) {
    if (!orderId) return;
    try {
      sessionStorage.removeItem(payStorageKey(orderId, 'sale'));
      sessionStorage.removeItem(payStorageKey(orderId, 'code'));
      sessionStorage.removeItem(payStorageKey(orderId, 'started'));
    } catch (_) {}
  }

async function callCreatePayment({ linkCode, orderId, deliveryAddress, customerName, customerEmail, customerPhone } = {}) {
  const body = { language: 'en' };
  if (orderId) body.order_id = orderId;
  if (linkCode) body.payment_link_code = linkCode;
  if (!body.order_id && !body.payment_link_code) throw new Error('Payment setup error');
  if (deliveryAddress) body.delivery_address = deliveryAddress;
  if (customerName) body.customer_name = customerName;
  if (customerEmail) body.customer_email = customerEmail;
  if (customerPhone) body.customer_phone = customerPhone;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-payment`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    },
    body: JSON.stringify(body),
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.sale_url) {
    const errMsg = data.error || data.message || `Could not start PayMe payment (${res.status})`;
    if (/hello undefined/i.test(errMsg)) {
      throw new Error('Payment service needs redeploying — run deploy-functions.bat');
    }
    throw new Error(errMsg);
  }
  return data;
}



  async function ensureOrderId(link) {
    if (!link?.link_code) throw new Error('Payment link missing code');

    const body = {
      payment_link_code: link.link_code,
      customer_name: getPayNameForCheckout(link) || undefined,
      customer_email: getPayEmailForCheckout(link) || undefined,
      customer_phone: getPayPhoneForCheckout(link) || undefined,
      delivery_address: getPayDeliveryAddress() || link.delivery_address || undefined,
    };

    const res = await fetch(`${SUPABASE_URL}/functions/v1/create-payment-link-order`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      },
      body: JSON.stringify(body),
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.id) {
      throw new Error(data.error || data.message || 'Could not start payment');
    }

    return data.id;
  }



  function getPayEmail() {
    const el = document.getElementById('payEmail');
    return el ? el.value.trim() : '';
  }

  function getPayPhone() {
    const el = document.getElementById('payPhone');
    return el ? el.value.trim() : '';
  }
function getPayName() {
  const el = document.getElementById('payName');
  return el ? el.value.trim() : '';
}

function cleanPayCustomerName(name) {
  const value = String(name || '').trim();
  if (!value || /^payment link customer$/i.test(value)) return '';
  return value;
}

function getPayNameForCheckout(link) {
  return getPayName() || cleanPayCustomerName(link?.customer_name) || '';
}

function getPayLinkDisplayName(link) {
  if (!link) return '';
  return String(
    link.link_name ||
    link.payment_link_name ||
    link.reference_name ||
    link.internal_name ||
    link.title ||
    link.name ||
    ''
  ).trim();
}

function getPayItemImage(item) {
  if (!item) return '';
  if (item.thumbnail_url) return item.thumbnail_url;
  if (item.thumbnail) return item.thumbnail;
  if (item.image_url) return item.image_url;
  if (item.image) return item.image;
  if (Array.isArray(item.images) && item.images[0]) return item.images[0];
  return '';
}

function payInputValue(value) {
  return esc(String(value || ''));
}
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
  }

  function isValidPhone(phone) {
    const digits = String(phone || '').replace(/\D/g, '');
    return digits.length >= 9 && digits.length <= 15;
  }

  function getPayEmailForCheckout(link) {
    return getPayEmail() || link.customer_email || '';
  }

  function getPayPhoneForCheckout(link) {
    return getPayPhone() || link.customer_phone || '';
  }

  async function savePayLinkCustomerEmail(link) {
    const email = getPayEmailForCheckout(link);
    if (!email) return '';
    const { error } = await sb.from('payment_links').update({ customer_email: email }).eq('link_code', link.link_code);
    if (!error) link.customer_email = email;
    return email;
  }

  async function savePayLinkCustomerPhone(link) {
    const phone = getPayPhoneForCheckout(link);
    if (!phone) return '';
    const { error } = await sb.from('payment_links').update({ customer_phone: phone }).eq('link_code', link.link_code);
    if (!error) link.customer_phone = phone;
    return phone;
  }

  async function savePayCustomerEmail(orderId, link) {
    const email = getPayEmailForCheckout(link);
    if (!email) return;
    await sb.from('orders').update({ customer_email: email }).eq('id', orderId);
    await savePayLinkCustomerEmail(link);
  }

  async function savePayCustomerPhone(orderId, link) {
    const phone = getPayPhoneForCheckout(link);
    if (!phone) return;
    await sb.from('orders').update({ customer_phone: phone }).eq('id', orderId);
    await savePayLinkCustomerPhone(link);
  }

  function getPayDeliveryAddress() {

    const el = document.getElementById('payAddress');

    return el ? el.value.trim() : '';

  }



  function getPayAddressForCheckout(link) {
    return getPayDeliveryAddress() || link.delivery_address || '';
  }

  async function savePayLinkDeliveryAddress(link) {
    const addr = getPayAddressForCheckout(link);
    if (!addr) return '';
    const { error } = await sb.from('payment_links').update({ delivery_address: addr }).eq('link_code', link.link_code);
    if (!error) link.delivery_address = addr;
    return addr;
  }

  async function savePayDeliveryAddress(orderId, link) {
    const addr = getPayAddressForCheckout(link);
    if (!addr) return;
    await sb.from('orders').update({ delivery_address: addr }).eq('id', orderId);
    await savePayLinkDeliveryAddress(link);
  }



  function renderInvalid() {

    document.getElementById('payCard').innerHTML = '<div class="pay-error">Invalid payment link.</div>';

  }

  function renderNotFound() {

    document.getElementById('payCard').innerHTML = '<div class="pay-error">Payment link not found or expired.</div>';

  }



  function renderPaid() {
    const total = paymentLink?.total != null ? paymentLink.total : '';
    const totalLine = total !== '' ? `Your payment of ₪${total} was confirmed.<br/>` : 'Your payment was confirmed.<br/>';
    document.getElementById('payCard').innerHTML = `
      <img src="logo.png" alt="Gremier Coffee Co." class="pay-logo"/>
      <div class="pay-status">✓</div>
      <div class="pay-status-title">Payment confirmed</div>
      <div class="pay-status-sub">Thank you! ${totalLine}We'll be in touch shortly.</div>
      <a href="index.html" class="pay-btn" style="display:inline-block;margin-top:24px;text-decoration:none;line-height:1">Back to Gremier</a>`;
  }



  function renderFailed() {

    document.getElementById('payCard').innerHTML = `

      <img src="logo.png" alt="Gremier Coffee Co." class="pay-logo"/>

      <div class="pay-status">⚠️</div>

      <div class="pay-status-title">Payment not completed</div>

      <div class="pay-status-sub">If PayMe already charged you, tap <strong>Check payment</strong> — don't pay again.<br/><br/>Only use Try again if PayMe shows the payment did not go through.</div>

      <button class="pay-btn" style="margin-top:16px;background:transparent;border:1px solid #555;color:#c4c4c4" onclick="recheckPayment()">Check payment</button>

      <button class="pay-btn" style="margin-top:12px" onclick="retryPayment()">Try again</button>`;

  }



  function renderProcessing() {
    document.getElementById('payCard').innerHTML = `
      <img src="logo.png" alt="Gremier Coffee Co." class="pay-logo"/>
      <div class="pay-status-title" style="margin-top:12px">One moment…</div>
      <div class="pay-status-sub">Confirming your payment.</div>`;
  }

  function showPaymentConfirmed(targetId) {
    navPayPush('paid');
    applyPayView('paid');
    if (targetId) clearCheckoutSession(targetId);
  }

  function paymeSaleIdForOrder(id) {
    if (!id) return '';
    try {
      return sessionStorage.getItem(payStorageKey(id, 'sale')) || '';
    } catch (_) {
      return '';
    }
  }

  async function syncPaidOrderToSheet(targetId, maxAttempts) {
    let id = targetId || orderId;
    for (let i = 0; i < maxAttempts; i++) {
      if (!id) {
        try { id = sessionStorage.getItem('gremier_pay_last_order') || ''; } catch (_) {}
      }
      if (!id) return;

      try {
        const data = await confirmPaymentReturn();
        if (data.order_id) {
          orderId = data.order_id;
          id = data.order_id;
        }
      } catch (e) {
        console.warn('confirm during sync:', e);
      }

      const notifyResult = await queuePaidOrderForOps(id, i > 0);
      if (notifyResult?.sent || notifyResult?.skipped === 'already_notified') return;

      const { data: order } = await sb.from('orders')
        .select('payment_status, delivery_info')
        .eq('id', id)
        .maybeSingle();
      if (order?.payment_status === 'paid' && order?.delivery_info?.order_notified_at) return;

      await new Promise(r => setTimeout(r, i < 2 ? 600 : 1500));
    }
  }

  async function finishPaidReturn(oid, opts) {
    opts = opts || {};
    if (linkCode) {
      const { data: link } = await sb.from('payment_links').select('*').eq('link_code', linkCode).maybeSingle();
      if (link) paymentLink = link;
    }

    let targetId = oid || orderId;
    const trustPayMeReturn = opts.trustPayMeReturn === true || opts.skipConfirm === true;

    if (await checkPaidLocally()) {
      showPaymentConfirmed(targetId);
      syncPaidOrderToSheet(targetId, 20).catch(function (e) {
        console.warn('Background payment sync:', e);
      });
      return;
    }

    // PayMe sent the customer back — show confirmed now; mark paid + email in background.
    if (trustPayMeReturn) {
      showPaymentConfirmed(targetId);
      syncPaidOrderToSheet(targetId, 20).catch(function (e) {
        console.warn('Background payment sync:', e);
      });
      return;
    }

    for (let i = 0; i < 2; i++) {
      const data = await confirmPaymentReturn();
      if (data.order_id) {
        orderId = data.order_id;
        targetId = data.order_id;
      }
      if (data.paid || await checkPaidLocally()) {
        showPaymentConfirmed(targetId);
        syncPaidOrderToSheet(targetId, 20).catch(function (e) {
          console.warn('Background payment sync:', e);
        });
        return;
      }
      if (i < 1) await new Promise(r => setTimeout(r, 600));
    }

    if (shouldTrustPayMeReturn()) {
      showPaymentConfirmed(targetId);
      syncPaidOrderToSheet(targetId, 20).catch(function (e) {
        console.warn('Background payment sync:', e);
      });
      return;
    }

    renderFailed();
    navPayReplace('failed');
  }

  async function getReturnPayload() {
    const p = new URLSearchParams(window.location.search);
    const txn = p.get('transaction_id') || (linkCode ? `pl_${linkCode}` : '');
    const resolvedOrderId = p.get('order_id') || orderId
      || (function () { try { return sessionStorage.getItem('gremier_pay_last_order') || ''; } catch (_) { return ''; } })()
      || (txn && !txn.startsWith('pl_') ? txn.split('_')[0] : '');

    let resolvedLinkCode = linkCode || p.get('code') || '';
if (!resolvedLinkCode && resolvedOrderId) {
      try { resolvedLinkCode = sessionStorage.getItem(payStorageKey(resolvedOrderId, 'code')) || ''; } catch (_) {}
    }

    if (!resolvedOrderId && resolvedLinkCode) {
      const { data: lnk } = await sb.from('payment_links')
        .select('last_order_id, order_id')
        .eq('link_code', resolvedLinkCode)
        .maybeSingle();
      resolvedOrderId = lnk?.last_order_id || (!isReusableLink(lnk) && lnk?.order_id) || '';
    }

    if (!resolvedOrderId && resolvedLinkCode) {
      const { data: rows } = await sb.from('orders')
        .select('id')
        .filter('delivery_info->>payment_link_code', 'eq', resolvedLinkCode)
        .eq('payment_status', 'unpaid')
        .order('created_at', { ascending: false })
        .limit(1);
      if (rows?.[0]?.id) resolvedOrderId = rows[0].id;
    }

    let paymeSaleId = p.get('payme_sale_id') || p.get('sale_id') || '';
    if (!paymeSaleId && resolvedOrderId) {
      try { paymeSaleId = sessionStorage.getItem(payStorageKey(resolvedOrderId, 'sale')) || ''; } catch (_) {}
    }
    if (!paymeSaleId && resolvedOrderId) {
      const { data: order } = await sb.from('orders').select('delivery_info').eq('id', resolvedOrderId).maybeSingle();
      paymeSaleId = order?.delivery_info?.payme_sale_id || '';
    }
    if (!paymeSaleId && paymentLink?.payme_sale_id) paymeSaleId = paymentLink.payme_sale_id;

    return {
      order_id: resolvedOrderId,
      link_code: resolvedLinkCode,
      transaction_id: txn || resolvedOrderId || (resolvedLinkCode ? `pl_${resolvedLinkCode}` : ''),
      payment_return: isPaymentReturnUrl(),
      payme_status: p.get('payme_status') || p.get('payme_status_code') || '',
      status: p.get('status') || '',
      sale_status: p.get('sale_status') || p.get('payme_sale_status') || '',
      payme_sale_id: paymeSaleId,
      payme_transaction_id: p.get('payme_transaction_id') || '',
    };
  }

  function hasExplicitPaymentFailure() {
    const p = new URLSearchParams(window.location.search);
    const st = String(p.get('payme_status') || p.get('status') || p.get('sale_status') || p.get('payme_sale_status') || '').toLowerCase();
    if (!st) return false;
    return ['failed', 'error', 'cancelled', 'canceled', 'declined', '0'].includes(st);
  }

  function shouldTrustPayMeReturn() {
    return isPaymentReturnUrl() && !hasExplicitPaymentFailure();
  }

  async function checkPaidLocally() {
    if (linkCode) {
      const { data: link } = await sb.from('payment_links').select('*').eq('link_code', linkCode).maybeSingle();
      if (link) {
        paymentLink = { ...(paymentLink || {}), ...link };
        if (link.order_id && !isReusableLink(link)) orderId = link.order_id;
        if (link.status === 'paid' && !isReusableLink(link)) return true;
        if (link.order_id && !isReusableLink(link)) {
          const { data: order } = await sb.from('orders').select('payment_status').eq('id', link.order_id).maybeSingle();
          if (order?.payment_status === 'paid') return true;
        }
      }
    }
    if (orderId) {
      const { data: order } = await sb.from('orders').select('payment_status').eq('id', orderId).maybeSingle();
      if (order?.payment_status === 'paid') return true;
    }
    return false;
  }

  function isPaymentReturnUrl() {
    const p = new URLSearchParams(window.location.search);
    if (p.get('payment') === 'return') return true;
    const paymeKeys = ['payme_status', 'payme_sale_status', 'sale_status', 'payme_sale_id', 'payme_transaction_id'];
    return paymeKeys.some(k => p.has(k));
  }

  async function confirmPaymentReturn() {
    const controller = new AbortController();
    const timer = setTimeout(function () { controller.abort(); }, 10000);
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/confirm-payment-return`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        },
        body: JSON.stringify(await getReturnPayload()),
        signal: controller.signal,
      });
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok && !data.error) data.error = 'HTTP ' + res.status;
      if (data.order_id) orderId = data.order_id;
      return data;
    } catch (e) {
      console.warn('confirmPaymentReturn:', e);
      return { paid: false, error: String(e) };
    } finally {
      clearTimeout(timer);
    }
  }

  /** Queue paid order for Ops scheduling.
   * Public client intentionally does not call notify-paid-order.
   * confirm-payment-return must verify PayMe server-side and trigger email/Ops sync itself.
   */
  async function queuePaidOrderForOps(oid, force) {
    return { skipped: 'client_notify_disabled' };
  }

  async function recheckPayment() {
    renderProcessing();
    if (await checkPaidLocally()) {
      await finishPaidReturn(orderId);
      return;
    }
    for (let i = 0; i < 3; i++) {
      const data = await confirmPaymentReturn();
      if (data.paid || await checkPaidLocally()) {
        orderId = data.order_id || orderId;
        await finishPaidReturn(orderId);
        return;
      }
      if (i < 2) await new Promise(r => setTimeout(r, 800));
    }
    if (shouldTrustPayMeReturn()) {
      await finishPaidReturn(orderId, { trustPayMeReturn: true });
      return;
    }
    renderFailed();
  }

  async function handleReturn() {
    if (!isPaymentReturnUrl()) return false;

    const p = params;
    orderId = p.get('order_id') || p.get('transaction_id');
    if (orderId && orderId.includes('_') && !orderId.startsWith('pl_')) {
      const uuid = orderId.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
      if (uuid) orderId = uuid[0];
    }
    if (!orderId) {
      try { orderId = sessionStorage.getItem('gremier_pay_last_order') || ''; } catch (_) {}
    }

    if (linkCode) {
      const { data: link } = await sb.from('payment_links').select('*').eq('link_code', linkCode).maybeSingle();
      if (link) {
        paymentLink = link;
        if (!orderId && link.order_id && !isReusableLink(link)) orderId = link.order_id;
      }
    }

    if (await checkPaidLocally()) {
      await finishPaidReturn(orderId);
      return true;
    }

    // Don't block the UI on slow server calls — PayMe return means payment went through.
    if (shouldTrustPayMeReturn()) {
      renderProcessing();
      navPayReplace('pending');
      await finishPaidReturn(orderId, { trustPayMeReturn: true });
      return true;
    }

    renderProcessing();
    navPayReplace('pending');

    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const data = await confirmPaymentReturn();
        if (data.order_id) orderId = data.order_id;
        if (data.paid || await checkPaidLocally()) {
          await finishPaidReturn(orderId);
          return true;
        }
      } catch (err) {
        console.warn('Payment confirm attempt failed:', err);
      }
      if (attempt < 1) await new Promise(r => setTimeout(r, 600));
    }

    if (hasExplicitPaymentFailure()) {
      navPayPush('failed');
      applyPayView('failed');
    } else {
      renderFailed();
      navPayReplace('failed');
    }
    return true;
  }

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderCheckout(link) {
  const items = (link.items || []).map(i =>
    `<div class="pay-line"><span>${esc(i.name_en)} ×${esc(String(i.qty))}</span><span>₪${parseFloat(i.price * i.qty).toFixed(2)}</span></div>`
  ).join('');
  const discountLine = link.discount > 0
    ? `<div class="pay-line pay-discount"><span>Discount${link.discount_note ? ' — ' + esc(link.discount_note) : ''}</span><span>-₪${link.discount}</span></div>`
    : '';
  const customer = link.customer_name
    ? `<div class="pay-customer">For ${esc(link.customer_name)}${link.customer_phone ? ' · ' + esc(link.customer_phone) : ''}</div>`
    : '';

    document.getElementById('payCard').innerHTML = `

      <img src="logo.png" alt="Gremier Coffee Co." class="pay-logo"/>

      <div class="pay-brand">Gremier Coffee Co.</div>

      <div class="pay-sub">Secure payment</div>

      ${customer}

      <div class="pay-items">${items}${discountLine}</div>

      <div class="pay-total">

        <span class="pay-total-label">Total</span>

        <span class="pay-total-amt">₪${link.total}</span>

      </div>

      <div class="pay-field">
  <label for="payName">Full name <span style="text-transform:none;letter-spacing:0;color:#c0392b">*</span></label>
  <input type="text" id="payName" placeholder="Your full name" value="${payInputValue(isReusableLink(link) ? '' : cleanPayCustomerName(link.customer_name))}" required/>
  <div class="pay-field-hint">Required — this name will be saved on your order.</div>
</div>

        <label for="payEmail">Email <span style="text-transform:none;letter-spacing:0;color:#c0392b">*</span></label>

        <input type="email" id="payEmail" placeholder="you@example.com" value="${(link.customer_email || '').replace(/"/g, '&quot;')}" required/>

        <div class="pay-field-hint">Required — we'll send your order confirmation here after payment.</div>

      </div>

      <div class="pay-field">

        <label for="payPhone">Phone <span style="text-transform:none;letter-spacing:0;color:#c0392b">*</span></label>

        <input type="tel" id="payPhone" placeholder="05X-XXXXXXX" value="${(link.customer_phone || '').replace(/"/g, '&quot;')}" required/>

        <div class="pay-field-hint">Required — so we can reach you about delivery.</div>

      </div>

      <div class="pay-field">

        <label for="payAddress">Delivery address <span style="text-transform:none;letter-spacing:0;color:#666">(optional)</span></label>

        <input type="text" id="payAddress" placeholder="City, street, apartment…" value="${(link.delivery_address || '').replace(/"/g, '&quot;')}"/>

        <div class="pay-field-hint">Add your address here if you know it — otherwise we'll confirm delivery details with you on WhatsApp.</div>

      </div>

      <button class="pay-btn" id="payBtn" onclick="startPayment()">Pay with PayMe</button>

      <div class="pay-note">You'll be redirected to PayMe to pay securely by card.</div>

      <div class="pay-error" id="payError" style="display:none"></div>`;

  }



  async function retryPayment() {

    if (await checkPaidLocally()) {
      navPayPush('paid');
      applyPayView('paid');
      return;
    }

    if (linkCode) {
      const { data: link } = await sb.from('payment_links').select('*').eq('link_code', linkCode).maybeSingle();
      if (link) paymentLink = link;
    }

    if (!paymentLink) return;

    applyPayView('checkout');

    navPayReplace('checkout');

  }



  async function startPayment() {
    if (paymentStarting) return;

    const btn = document.getElementById('payBtn');
    const errEl = document.getElementById('payError');

    if (await checkPaidLocally()) {
      navPayPush('paid');
      applyPayView('paid');
      return;
    }

    paymentStarting = true;
    if (btn) { btn.disabled = true; btn.textContent = 'Redirecting…'; }
    if (errEl) errEl.style.display = 'none';

    try {
      const deliveryAddress = getPayAddressForCheckout(paymentLink);
      const customerName = getPayNameForCheckout(paymentLink);

if (!customerName) {
  if (errEl) {
    errEl.textContent = 'Please enter your full name';
    errEl.style.display = 'block';
  }
  paymentStarting = false;
  if (btn) {
    btn.disabled = false;
    btn.textContent = 'Pay with PayMe';
  }
  return;
}
      const customerEmail = getPayEmailForCheckout(paymentLink);
      const customerPhone = getPayPhoneForCheckout(paymentLink);
      if (!customerEmail || !isValidEmail(customerEmail)) {
        if (errEl) { errEl.textContent = 'Please enter a valid email address'; errEl.style.display = 'block'; }
        paymentStarting = false;
        if (btn) { btn.disabled = false; btn.textContent = 'Pay with PayMe'; }
        return;
      }
      if (!customerPhone || !isValidPhone(customerPhone)) {
        if (errEl) { errEl.textContent = 'Please enter a valid phone number'; errEl.style.display = 'block'; }
        paymentStarting = false;
        if (btn) { btn.disabled = false; btn.textContent = 'Pay with PayMe'; }
        return;
      }
      if (!isReusableLink(paymentLink)) {
  await savePayLinkDeliveryAddress(paymentLink);
  await savePayLinkCustomerEmail(paymentLink);
  await savePayLinkCustomerPhone(paymentLink);
}
      navPayReplace('checkout');

      // Reusable links always get a fresh order per payment — never reuse link.order_id.
      if (paymentLink.order_id && !isReusableLink(paymentLink)) {
        orderId = paymentLink.order_id;
      } else {
      orderId = await ensureOrderId(paymentLink);
        if (!isReusableLink(paymentLink)) paymentLink.order_id = orderId;
        if (isReusableLink(paymentLink)) {
          await sb.from('payment_links').update({ last_order_id: orderId }).eq('link_code', paymentLink.link_code);
        }
      }
      await savePayDeliveryAddress(orderId, paymentLink);
      await savePayCustomerEmail(orderId, paymentLink);
      await savePayCustomerPhone(orderId, paymentLink);

      let payData;
      try {
        payData = await callCreatePayment({ orderId, linkCode: paymentLink.link_code, customerName, customerEmail, customerPhone });
      } catch (e) {
        const msg = (e.message || '').toLowerCase();
        if (msg.includes('already paid')) {
          try { await finishPaidReturn(orderId); } catch (_) {}
          return;
        }
        const tryLinkCode = msg.includes('not found') || msg.includes('missing order') || msg.includes('order_id');
        if (tryLinkCode) {
         payData = await callCreatePayment({
  linkCode: paymentLink.link_code,
  orderId,
  deliveryAddress: deliveryAddress || undefined,
  customerName: customerName || undefined,
  customerEmail: customerEmail || undefined,
  customerPhone: customerPhone || undefined,
});
        } else {
          throw e;
        }
      }

      rememberCheckoutSession(orderId, payData.payme_sale_id, paymentLink.link_code);
      window.location.href = payData.sale_url;
    } catch (e) {
      paymentStarting = false;
      if (btn) { btn.disabled = false; btn.textContent = 'Pay with PayMe'; }
      if (errEl) { errEl.textContent = e.message || 'Payment error'; errEl.style.display = 'block'; }
    }
  }



  async function init() {

    window.addEventListener('popstate', handlePayPopState);



    if (!linkCode) {

      applyPayView('invalid');

      navPayReplace('invalid');

      return;

    }

    if (await handleReturn()) return;



    const { data: link, error } = await sb.from('payment_links').select('*').eq('link_code', linkCode).maybeSingle();

    if (error || !link) {

      applyPayView('notfound');

      navPayReplace('notfound');

      return;

    }

    paymentLink = link;



    if (link.status === 'paid' && !isReusableLink(link)) {

      applyPayView('paid');

      navPayReplace('paid');

      return;

    }



    if (link.order_id && !isReusableLink(link)) {

      const { data: order } = await sb.from('orders').select('payment_status, delivery_address').eq('id', link.order_id).maybeSingle();

      if (order?.payment_status === 'paid') {

        applyPayView('paid');

        navPayReplace('paid');

        return;

      }

      if (order?.delivery_address && !link.delivery_address) link.delivery_address = order.delivery_address;

    }



    applyPayView('checkout');

    navPayReplace('checkout');

  }



  init();

</script>
